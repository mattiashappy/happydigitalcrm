{% extends 'base.html' %}
{% block title %}{{ 'Edit' if contact else 'New' }} Contact — CRM{% endblock %}
{% block content %}

<div class="max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{{ url_for('contacts') }}" class="text-sm text-gray-400 hover:text-gray-700">← Contacts</a>
    <span class="text-gray-300">/</span>
    <h1 class="text-xl font-bold">{{ 'Edit contact' if contact else 'New contact' }}</h1>
  </div>

  <form method="POST" class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name <span class="text-red-400">*</span></label>
      <input type="text" name="name" required value="{{ contact.name if contact else '' }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Company</label>
      <input type="text" name="company" value="{{ contact.company or '' if contact else '' }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <input type="email" name="email" value="{{ contact.email or '' if contact else '' }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
      <input type="tel" name="phone" value="{{ contact.phone or '' if contact else '' }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Monthly Fee (kr)</label>
      <input type="number" name="monthly_fee" step="1" placeholder="0"
             value="{{ contact.monthly_fee | int if contact and contact.monthly_fee else '' }}"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
      <textarea name="notes" rows="3"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">{{ contact.notes or '' if contact else '' }}</textarea>
    </div>
    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition">
        {{ 'Save changes' if contact else 'Add contact' }}
      </button>
      <a href="{{ url_for('contacts') }}"
         class="text-sm text-gray-500 hover:text-gray-700 px-4 py-2 rounded-lg border border-gray-200 transition">
        Cancel
      </a>
    </div>
  </form>
</div>

{% endblock %}
